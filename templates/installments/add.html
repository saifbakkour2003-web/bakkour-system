<!-- templates/installments/add.html -->
{% extends "layout_new.html" %}
{% block title %}{{ _('إضافة تقسيط') }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 750px;">
  <div class="card shadow-sm p-4 mt-3">

    <h2 class="mb-2">{{ _('إضافة عقد تقسيط') }}</h2>
    <p class="text-muted">
      {{ _('أدخل كود منتج واحد أو عدة أكواد وسيتم دمجهم ضمن عقد واحد تلقائياً.') }}
    </p>

    <form method="POST">

      <!-- التاريخ -->
      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label">{{ _('تاريخ الإضافة') }}</label>
          <input type="date"
                 name="date_added"
                 class="form-control"
                 value="{{ datetime.utcnow().strftime('%Y-%m-%d') }}">
        </div>
      </div>

      <!-- القيم المالية -->
      <div class="row g-2 mt-3">
        <div class="col-md-4">
          <label class="form-label">{{ _('السعر الكلي (لجميع المنتجات)') }}</label>
          <input type="number" step="0.01"
                 name="total_price"
                 class="form-control"
                 required>
        </div>

        <div class="col-md-4">
          <label class="form-label">{{ _('السلفة') }}</label>
          <input type="number" step="0.01"
                 name="initial_payment"
                 class="form-control"
                 value="0">
        </div>

        <div class="col-md-4">
          <label class="form-label">{{ _('القسط الشهري') }}</label>
          <input type="number" step="0.01"
                 name="monthly_installment"
                 class="form-control"
                 value="0">
        </div>
      </div>

      <hr class="my-4">

      <!-- أكواد المنتجات -->
      <h5 class="mb-3">{{ _('أكواد المنتجات ضمن العقد') }}</h5>

      <div id="codes">

        <div class="row g-2 mb-2 code-row">
          <div class="col-md-11">
            <input type="text"
                   name="product_code[]"
                   class="form-control"
                   placeholder="{{ _('أدخل كود المنتج') }}"
                   required>
          </div>

          <div class="col-md-1 d-grid">
            <button type="button"
                    class="btn btn-outline-danger"
                    onclick="removeRow(this)">
              ×
            </button>
          </div>
        </div>

      </div>

      <button type="button"
              class="btn btn-outline-secondary btn-sm"
              onclick="addCodeRow()">
        + {{ _('إضافة كود آخر') }}
      </button>

      <button type="submit"
              class="btn btn-success w-100 mt-4">
        {{ _('حفظ العقد') }}
      </button>

    </form>

    <a href="{{ url_for('customers.customer_page', id=customer.id) }}"
       class="btn btn-secondary w-100 mt-2">
      {{ _('رجوع') }}
    </a>

  </div>
</div>

<script>
function addCodeRow(){
  const container = document.getElementById('codes');

  const row = document.createElement('div');
  row.className = "row g-2 mb-2 code-row";

  row.innerHTML = `
    <div class="col-md-11">
      <input type="text"
             name="product_code[]"
             class="form-control"
             placeholder="أدخل كود المنتج"
             required>
    </div>

    <div class="col-md-1 d-grid">
      <button type="button"
              class="btn btn-outline-danger"
              onclick="removeRow(this)">
        ×
      </button>
    </div>
  `;

  container.appendChild(row);
}

function removeRow(btn){
  const container = document.getElementById('codes');
  const rows = container.querySelectorAll('.code-row');

  if(rows.length <= 1){
    rows[0].querySelector('input').value = '';
    return;
  }

  btn.closest('.code-row').remove();
}
</script>

{% endblock %}
