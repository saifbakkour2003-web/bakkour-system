{% extends "layout_new.html" %}

{% block title %}{{ _('إضافة دفعة') }}{% endblock %}

{% block content %}

<h2 class="mb-4">{{ _('إضافة دفعة على المنتج:') }} {{ product.name }}</h2>

<form method="POST" class="card shadow-sm p-4">

    <div class="mb-3">
        <label class="form-label">{{ _('المبلغ:') }}</label>
        <input type="number" step="0.01" name="amount" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _('تاريخ الدفع:') }}</label>
        <input type="date" name="date_paid" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">{{ _('إضافة الدفعة') }}</button>

    <a href="{{ url_for('customers.customer_page', id=product.customer_id) }}"
       class="btn btn-secondary ms-2">{{ _('رجوع لصفحة الزبون') }}</a>

</form>

{% endblock %}
