<!-- templates/payments/edit_general_payment.html -->
{% extends "layout_new.html" %}

{% block title %}{{ _('تعديل دفعة عامة') }}{% endblock %}

{% block content %}

<div class="container" style="max-width: 500px;">

    <div class="card shadow-sm p-4 mt-4">

        <h2 class="mb-4 text-center">
            {{ _('تعديل دفعة عامة للزبون:') }} {{ pick_lang(customer.name, customer.name_tr) }}
        </h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">{{ _('المبلغ:') }}</label>
                <input type="number"
                       step="0.01"
                       name="amount"
                       class="form-control"
                       value="{{ payment.amount }}"
                       required>
            </div>

            <!-- ✅ NEW: source -->
            <div class="mb-3">
                <label class="form-label">{{ _('سبب الدفعة (اختياري):') }}</label>
                <input type="text"
                       name="source"
                       class="form-control"
                       value="{{ payment.source or '' }}"
                       placeholder="{{ _('مثال: دفعة على الدين / تسوية / دفعة عامة') }}">
            </div>

            <div class="mb-3">
                <label class="form-label">{{ _('تاريخ الدفع:') }}</label>
                <input type="date"
                       name="date_paid"
                       class="form-control"
                       value="{{ payment.date_paid.strftime('%Y-%m-%d') }}">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                {{ _('حفظ التعديلات') }}
            </button>

        </form>

        <a href="{{ url_for('customers.customer_page', id=customer.id) }}"
            class="btn btn-secondary w-100 mt-2">
            {{ _('الرجوع لصفحة الزبون') }}
        </a>

    </div>

</div>

{% endblock %}
