<!-- templates/payments/add_cash_debt.html -->
{% extends "layout_new.html" %}

{% block title %}{{ _('إضافة دين نقدي') }}{% endblock %}

{% block content %}

<div class="container" style="max-width: 520px;">

  <h2 class="mb-4">{{ _('إضافة دين نقدي للزبون رقم:') }} {{ customer.id }}</h2>

  <div class="card shadow-sm p-4">
    <form method="POST">

      <!-- ✅ اختيار نوع الإدخال -->
      <div class="mb-3">
        <label class="form-label">{{ _('طريقة الإضافة') }}</label>
        <select name="mode" id="mode" class="form-select" onchange="toggleMode()" required>
          <option value="product">{{ _('من منتج مسجل (بكود)') }}</option>
          <option value="manual">{{ _('دين يدوي (بدون منتج)') }}</option>
        </select>
      </div>

      <!-- ====== Product Mode ====== -->
      <div id="productBox">
        <div class="mb-3">
          <label class="form-label">{{ _('كود المنتج') }}</label>
          <input type="text"
                 name="product_code"
                 class="form-control"
                 placeholder="{{ _('مثال: ELE-FRD-000123') }}">
        </div>

        {% if product_name %}
        <div class="mb-3">
          <label class="form-label">{{ _('اسم المنتج') }}</label>
          <input type="text" class="form-control" value="{{ product_name }}" disabled>
        </div>
        {% endif %}
      </div>

      <!-- ====== Manual Mode ====== -->
      <div id="manualBox" style="display:none;">
        <div class="mb-3">
          <label class="form-label">{{ _('اسم الدين') }}</label>
          <input type="text" name="manual_name" class="form-control" placeholder="{{ _('مثال: تركيب / أجرة / قطعة غير مسجلة') }}">
        </div>

        <div class="mb-3">
          <label class="form-label">{{ _('كود اختياري') }}</label>
          <input type="text" name="manual_code" class="form-control" placeholder="{{ _('اختياري') }}">
        </div>

        <div class="mb-3">
          <label class="form-label">{{ _('رأس المال (مهم للأرباح)') }}</label>
          <input type="number" step="0.01" name="capital_price" class="form-control" placeholder="0.00">
        </div>
      </div>

      <!-- السعر -->
      <div class="mb-3">
        <label class="form-label">{{ _('سعر البيع (دين نقدي)') }}</label>
        <input type="number" step="0.01" name="price" class="form-control" required>
      </div>

      <!-- التاريخ -->
      <div class="mb-3">
        <label class="form-label">{{ _('تاريخ الإضافة') }}</label>
        <input type="date"
               name="date_added"
               class="form-control"
               value="{{ datetime.utcnow().strftime('%Y-%m-%d') }}"
               required>
      </div>

      <button type="submit" class="btn btn-success w-100">
        {{ _('إضافة الدين') }}
      </button>

    </form>

    <a href="{{ url_for('customers.customer_page', id=customer.id) }}"
       class="btn btn-secondary w-100 mt-2">
      {{ _('الرجوع لصفحة الزبون') }}
    </a>
  </div>

</div>

<script>
function toggleMode(){
  const mode = document.getElementById('mode').value;
  const productBox = document.getElementById('productBox');
  const manualBox = document.getElementById('manualBox');

  if(mode === 'manual'){
    productBox.style.display = 'none';
    manualBox.style.display = 'block';
  } else {
    productBox.style.display = 'block';
    manualBox.style.display = 'none';
  }
}
</script>

{% endblock %}
