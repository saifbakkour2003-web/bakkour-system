<div class="card rounded-4 border-0 shadow-sm">
  <div class="card-body p-3">
    <form method="get" action="/shop/products" class="d-grid gap-3">

      <div>
        <label class="form-label small text-muted">{{ _('بحث') }}</label>
        <input type="text" name="q" value="{{ q or '' }}"
               class="form-control bk-input" placeholder="{{ _('اكتب اسم/كود المنتج...') }}">
      </div>

      <div>
        <label class="form-label small text-muted">{{ pick_lang('القسم','Bölüm') }}</label>
        <select name="dept" class="form-select bk-input">
          <option value="" {% if not dept %}selected{% endif %}>{{ _('الكل') }}</option>
          <option value="electrical" {% if dept=='electrical' %}selected{% endif %}>{{ pick_lang('كهربائيات','Elektrik') }}</option>
          <option value="linens" {% if dept=='linens' %}selected{% endif %}>{{ pick_lang('بياضات','Tekstil') }}</option>
          <option value="crystal" {% if dept=='crystal' %}selected{% endif %}>{{ pick_lang('بلوريات','Kristal') }}</option>
        </select>
      </div>

    {% if sub_categories %}
    <div>
    <label class="form-label small text-muted">{{ _('التصنيف الفرعي') }}</label>
    <select name="sub" class="form-select bk-input">
        <option value="">{{ _('الكل') }}</option>
        {% for sc in sub_categories %}
        <option value="{{ sc.id }}" {% if sub_id == sc.id %}selected{% endif %}>
            {{ pick_lang(sc.name, sc.name_tr) }}
        </option>
        {% endfor %}
    </select>
    </div>
    {% endif %}

      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="only_discounted" value="1"
               id="onlyDiscounted" {% if only_discounted %}checked{% endif %}>
        <label class="form-check-label" for="onlyDiscounted">{{ _('عروض فقط') }}</label>
      </div>

      <div>
        <label class="form-label small text-muted">{{ _('الترتيب') }}</label>
        <select name="sort" class="form-select bk-input">
          <option value="" {% if not sort %}selected{% endif %}>{{ _('افتراضي') }}</option>
          <option value="new" {% if sort=='new' %}selected{% endif %}>{{ _('الأحدث') }}</option>
          <!-- <option value="price_asc" {% if sort=='price_asc' %}selected{% endif %}>{{ _('السعر: الأقل أولاً') }}</option>
          <option value="price_desc" {% if sort=='price_desc' %}selected{% endif %}>{{ _('السعر: الأعلى أولاً') }}</option> -->
        </select>
      </div>

      <div class="d-grid gap-2">
        <button class="btn btn-dark">{{ _('تطبيق') }}</button>
        <a class="btn btn-outline-secondary" href="/shop/products">{{ _('إعادة ضبط') }}</a>
      </div>

      {% if not is_shop_logged_in %}
        <div class="alert alert-light border rounded-4 small mb-0">
          <i class="bi bi-lock"></i>
          {{ _('الأسعار مخفية للضيوف.') }}
          <a href="/shop/login" class="text-decoration-none fw-semibold">{{ _('سجّل دخول') }}</a>
        </div>
      {% endif %}

    </form>
  </div>
</div>
