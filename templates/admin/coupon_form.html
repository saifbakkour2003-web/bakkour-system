<!-- templates/admin/coupon_form.html -->
{% extends "layout_new.html" %}
{% block title %}{{ _('كوبون') }}{% endblock %}

{% block content %}
<h2 class="mb-3">{{ c and _('تعديل كوبون') or _('إضافة كوبون') }}</h2>

<form method="post" class="card p-4 shadow-sm" style="max-width: 760px;">
  <div class="row g-3">

    <div class="col-md-6">
      <label class="form-label">{{ _('الكود') }}</label>
      <input class="form-control" name="code" value="{{ c.code if c else '' }}" placeholder="INSTA5" required>
      <div class="form-text">{{ _('يفضّل أحرف كبيرة + أرقام') }}</div>
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('قيمة الخصم (مبلغ ثابت)') }}</label>
      <input class="form-control" type="number" step="0.01" name="discount_amount"
             value="{{ c.discount_amount if c else 0 }}" required>
    </div>

    <div class="col-12">
      <label class="form-label">{{ _('عنوان اختياري') }}</label>
      <input class="form-control" name="title" value="{{ c.title if c else '' }}" placeholder="خصم ستوري اليوم">
    </div>

    <div class="col-12">
      <label class="form-label">{{ _('وصف اختياري') }}</label>
      <textarea class="form-control" name="description" rows="3">{{ c.description if c else '' }}</textarea>
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('حد الاستخدام (اختياري)') }}</label>
      <input class="form-control" type="number" name="usage_limit"
             value="{{ c.usage_limit if c and c.usage_limit is not none else '' }}"
             placeholder="مثلاً 5">
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('Auto-claim لأول X دخول؟') }}</label>
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" name="auto_claim" id="auto_claim"
               {% if c and c.auto_claim %}checked{% endif %}>
        <label class="form-check-label" for="auto_claim">
          {{ _('نعم') }}
        </label>
      </div>
      <div class="form-text">{{ _('إذا فعلته + usage_limit=5 => أول 5 أشخاص يسجلوا دخول بيناخدوه') }}</div>
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('بداية') }}</label>
      <input class="form-control" type="datetime-local" name="start_at"
             value="{{ c.start_at.strftime('%Y-%m-%dT%H:%M') if c and c.start_at else '' }}">
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('نهاية') }}</label>
      <input class="form-control" type="datetime-local" name="end_at"
             value="{{ c.end_at.strftime('%Y-%m-%dT%H:%M') if c and c.end_at else '' }}">
    </div>

    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
               {% if not c or c.is_active %}checked{% endif %}>
        <label class="form-check-label" for="is_active">{{ _('فعال') }}</label>
      </div>
    </div>

    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary">{{ _('حفظ') }}</button>
      <a href="/admin/coupons/" class="btn btn-outline-secondary">{{ _('رجوع') }}</a>
    </div>

  </div>
</form>
{% endblock %}
