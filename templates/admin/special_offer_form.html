{% extends "layout_new.html" %}
{% block title %}{{ _('عرض خاص') }}{% endblock %}

{% block content %}
<h2 class="mb-3">{{ offer and _('تعديل عرض') or _('إضافة عرض') }}</h2>

<form method="post" class="card p-4 shadow-sm" style="max-width:900px">

  <div class="row g-3">
    <div class="col-md-8">
      <label class="form-label">{{ _('عنوان العرض') }}</label>
      <input class="form-control" name="title" required value="{{ offer.title if offer else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">{{ _('نوع العرض') }}</label>
      <select class="form-select" name="offer_kind" id="offerKind">
        {% set k = offer.offer_kind if offer else 'gift' %}
        <option value="gift" {% if k=='gift' %}selected{% endif %}>{{ _('هدية') }}</option>
        <option value="bundle_discount" {% if k=='bundle_discount' %}selected{% endif %}>{{ _('خصم على المنتجين') }}</option>
        <option value="third_discount" {% if k=='third_discount' %}selected{% endif %}>{{ _('خصم على منتج ثالث') }}</option>
      </select>
    </div>

    <div class="col-12">
      <label class="form-label">{{ _('ملاحظة مختصرة') }}</label>
      <input class="form-control" name="note" value="{{ offer.note if offer else '' }}">
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('المنتج الأول') }}</label>
      <select class="form-select" name="product1_id" required>
        {% for p in products %}
          <option value="{{ p.id }}" {% if offer and p.id==offer.product1_id %}selected{% endif %}>
            {{ p.code }} — {{ p.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('المنتج الثاني') }}</label>
      <select class="form-select" name="product2_id" required>
        {% for p in products %}
          <option value="{{ p.id }}" {% if offer and p.id==offer.product2_id %}selected{% endif %}>
            {{ p.code }} — {{ p.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-6" id="thirdWrap">
      <label class="form-label">{{ _('المنتج الثالث (هدية/خصم)') }}</label>
      <select class="form-select" name="third_product_id">
        <option value="">{{ _('-- لا يوجد --') }}</option>
        {% for p in products %}
          <option value="{{ p.id }}" {% if offer and offer.third_product_id and p.id==offer.third_product_id %}selected{% endif %}>
            {{ p.code }} — {{ p.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-6" id="discountWrap">
      <label class="form-label">{{ _('قيمة الخصم (ثابت)') }}</label>
      <input type="number" step="0.01" class="form-control" name="discount_amount"
             value="{{ offer.discount_amount if offer and offer.discount_amount is not none else '' }}">
      <div class="form-text">{{ _('مثال: 5 (يعني يطرح 5 من مجموع المنتجين أو من المنتج الثالث حسب النوع)') }}</div>
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('بداية العرض') }}</label>
      <input type="datetime-local" class="form-control" name="start_at"
        value="{{ offer.start_at.strftime('%Y-%m-%dT%H:%M') if offer and offer.start_at else '' }}">
    </div>

    <div class="col-md-6">
      <label class="form-label">{{ _('نهاية العرض') }}</label>
      <input type="datetime-local" class="form-control" name="end_at"
        value="{{ offer.end_at.strftime('%Y-%m-%dT%H:%M') if offer and offer.end_at else '' }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">{{ _('الستوك الإجمالي') }}</label>
      <input type="number" class="form-control" name="stock_limit"
        value="{{ offer.stock_limit if offer and offer.stock_limit is not none else '' }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">{{ _('المتبقي') }}</label>
      <input type="number" class="form-control" name="stock_remaining"
        value="{{ offer.stock_remaining if offer and offer.stock_remaining is not none else '' }}">
    </div>

    <div class="col-md-3 d-flex align-items-end">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
               {% if not offer or offer.is_active %}checked{% endif %}>
        <label class="form-check-label" for="isActive">{{ _('فعّال') }}</label>
      </div>
    </div>

    <div class="col-md-3 d-flex align-items-end">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="is_cancelled" id="isCancelled"
               {% if offer and offer.is_cancelled %}checked{% endif %}>
        <label class="form-check-label" for="isCancelled">{{ _('موقوف') }}</label>
      </div>
    </div>

    <div class="col-12">
      <button class="btn btn-primary w-100">{{ _('حفظ') }}</button>
    </div>
  </div>
</form>

<script>
  function syncFields(){
    const k = document.getElementById("offerKind").value;
    const thirdWrap = document.getElementById("thirdWrap");
    const discountWrap = document.getElementById("discountWrap");

    // gift: يحتاج third فقط
    if(k === "gift"){
      thirdWrap.style.display = "";
      discountWrap.style.display = "none";
    }
    // bundle_discount: يحتاج discount فقط
    else if(k === "bundle_discount"){
      thirdWrap.style.display = "none";
      discountWrap.style.display = "";
    }
    // third_discount: يحتاج third + discount
    else {
      thirdWrap.style.display = "";
      discountWrap.style.display = "";
    }
  }
  document.getElementById("offerKind").addEventListener("change", syncFields);
  syncFields();
</script>
{% endblock %}
