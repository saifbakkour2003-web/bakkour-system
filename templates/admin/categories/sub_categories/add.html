<!-- templates/admin/categories/sub_categories/add.html -->
{% extends "layout_new.html" %}
{% block title %}{{ _('إضافة تصنيف فرعي') }}{% endblock %}

{% block content %}
<h2 class="mb-4">{{ _('إضافة تصنيف فرعي') }}</h2>

{% if selected_dept %}
  <div class="alert alert-info py-2" style="max-width: 450px;">
    {{ _('القسم الحالي:') }}
    <b>{{ dept_labels[selected_dept] }}</b>
  </div>
{% endif %}

<form method="POST"
      class="card p-4 shadow-sm"
      style="max-width: 450px;">

    <div class="mb-3">
        <label class="form-label">{{ _('اسم التصنيف الفرعي') }}</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _('اسم التصنيف الفرعي (تركي)') }}</label>
        <input type="text" name="name_tr" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _('Code Prefix') }}</label>
        <input type="text"
            name="code_prefix"
            class="form-control"
            placeholder="{{ _('مثال: FRD') }}"
            maxlength="5"
            style="text-transform: uppercase;"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _('التصنيف الرئيسي') }}</label>
        <select name="main_category_id"
                class="form-select"
                required>
            <option value="">{{ _('-- اختر --') }}</option>
            {% for c in main_categories %}
            <option value="{{ c.id }}">
                {{ pick_lang(c.name, c.name_tr) }}
            </option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-primary w-100">
        {{ _('حفظ') }}
    </button>
</form>
{% endblock %}
