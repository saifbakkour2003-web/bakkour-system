{% extends "layout_new.html" %}
{% block title %}{{ _('تعديل تصنيف فرعي') }}{% endblock %}

{% block content %}
<h2 class="mb-4">✏️ {{ _('تعديل تصنيف فرعي') }}</h2>

{% if selected_dept %}
  <div class="alert alert-info py-2" style="max-width: 450px;">
    {{ _('القسم الحالي:') }}
    <b>{{ dept_labels[selected_dept] }}</b>
  </div>
{% endif %}

<form method="POST"
      class="card p-4 shadow-sm"
      style="max-width: 450px;">

    <div class="mb-3">
        <label class="form-label">{{ _('اسم التصنيف الفرعي') }}</label>
        <input type="text"
               name="name"
               class="form-control"
               value="{{ sub.name }}"
               required>
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _('اسم التصنيف الفرعي (تركي)') }}</label>
        <input type="text"
               name="name_tr"
               class="form-control"
               value="{{ sub.name_tr or '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _('Code Prefix') }}</label>
        <input type="text"
               name="code_prefix"
               class="form-control"
               value="{{ sub.code_prefix }}"
               style="text-transform: uppercase;"
               maxlength="5"
               required>
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _('القسم') }}</label>
        <select name="department" class="form-select" required>
            <option value="electrical" {% if sub.department == 'electrical' %}selected{% endif %}>⚡ {{ _('كهربائيات') }}</option>
            <option value="linens" {% if sub.department == 'linens' %}selected{% endif %}>🧺 {{ _('بياضات') }}</option>
            <option value="crystal" {% if sub.department == 'crystal' %}selected{% endif %}>🍷 {{ _('بلوريات') }}</option>
        </select>
    </div>

    <button class="btn btn-primary w-100">
        💾 {{ _('حفظ التعديلات') }}
    </button>
</form>
{% endblock %}
