<!-- templates/admin/categories/properties/add.html -->
{% extends "layout_new.html" %}
{% block title %}{{ _('إضافة خاصية') }}{% endblock %}

{% block content %}


<h2 class="mb-3">{{ _('إضافة خاصية') }}</h2>

<div class="d-flex gap-2 mb-3">
  <a class="btn btn-outline-warning {% if dept=='electrical' %}active{% endif %}" href="{{ url_for('admin_properties.list_properties', dept='electrical') }}">⚡ كهربائيات</a>
  <a class="btn btn-outline-info {% if dept=='linens' %}active{% endif %}" href="{{ url_for('admin_properties.list_properties', dept='linens') }}">🧺 بياضات</a>
  <a class="btn btn-outline-secondary {% if dept=='crystal' %}active{% endif %}" href="{{ url_for('admin_properties.list_properties', dept='crystal') }}">🍷 بلوريات</a>
</div>

<form method="POST" class="card p-4 shadow-sm" style="max-width: 520px;">

    <input type="hidden" name="department" value="{{ dept }}">

    <div class="mb-3">
        <label class="form-label">{{ _('اسم الخاصية') }}</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">{{ _('اسم الخاصية (تركي)') }}</label>
        <input type="text" name="name_tr" class="form-control">
    </div>


    <div class="mb-3">
        <label class="form-label">{{ _('نوع الإدخال') }}</label>
        <select name="input_type" class="form-select" required>
            <option value="text">{{ _('نص') }}</option>
            <option value="number">{{ _('رقم') }}</option>
            <option value="select">{{ _('قائمة') }}</option>
        </select>
    </div>

    <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" name="is_required" value="1" id="is_required">
        <label class="form-check-label" for="is_required">{{ _('خاصية إلزامية') }}</label>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="is_global" value="1" id="is_global">
        <label class="form-check-label" for="is_global">
          {{ _(' خاصية عامة لهذا القسم فقط') }} (Global)
        </label>
    </div>

    <div class="mb-3">
        <label class="form-label">{{ _('التصنيفات الفرعية (اختياري إذا كانت Global)') }}</label>
        <select name="sub_category_ids" class="form-select" multiple size="8" id="subsSelect">
            {% for s in sub_categories %}
              <option value="{{ s.id }}">{{ pick_lang(s.name, s.name_tr) }}</option>
            {% endfor %}
        </select>
        <small class="text-muted">{{ _('اضغط Ctrl لاختيار أكثر من عنصر') }}</small>
    </div>

    <button class="btn btn-primary w-100">{{ _('حفظ') }}</button>
</form>

<a class="btn btn-link mt-3" href="{{ url_for('admin_properties.list_properties', dept=dept) }}">{{ _('رجوع') }}</a>

<script>
  const globalCb = document.getElementById("is_global");
  const subsSelect = document.getElementById("subsSelect");

  function toggleSubs() {
    subsSelect.disabled = globalCb.checked;
  }
  globalCb.addEventListener("change", toggleSubs);
  toggleSubs();
</script>

{% endblock %}
